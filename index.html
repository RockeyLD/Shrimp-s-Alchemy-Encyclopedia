    --panel-solid: rgba(255,255,255,0.92);

  #canvas-container {

    height: 100vh;

    padding-top: 50px;
    background: var(--canvas-bg);
    transition: background 0.3s;

<script>
// =============================================
// LIVE DATA (populated from GitHub or cache)
// =============================================
const BASE_ELEMENTS = ['water', 'fire', 'earth', 'air'];
let ELEMENT_NAMES = {};
let ELEMENT_ICONS = {};
let FINAL_ITEMS = new Set();
let RECIPES = [];
let GHOST_IDS = [];

// =============================================
// Parse app.js source to extract data
// =============================================
function parseAppJs(source) {
  const elementNames = {};
  const elementIcons = {};
  const finalItems = new Set();
  const recipes = [];

  // Parse recipes FIRST (before any regex lastIndex issues)
  const recipeRegex = /_addRecipe\(\s*['"]([^'"]+)['"]\s*,\s*['"]([^'"]+)['"]\s*,\s*['"]([^'"]+)['"]\s*\)/g;
  let m;
  while ((m = recipeRegex.exec(source)) !== null) {
    recipes.push([m[1], m[2], m[3]]);
  }

  // Parse encrypted recipes (newer app.js format: base64 + XOR)
  const encryptedMatch = source.match(/const _0x\s*=\s*['"]([A-Za-z0-9+/=]+)['"]/);
  const keyMatch = source.match(/const _0k\s*=\s*\[([\d,\s]+)\]/);
  if (encryptedMatch && keyMatch) {
    try {
      const _0x = encryptedMatch[1];
      const _0k = keyMatch[1].split(',').map(Number);
      const _0d = atob(_0x);
      let _0s = '';
      for (let i = 0; i < _0d.length; i++) {
        _0s += String.fromCharCode(_0d.charCodeAt(i) ^ _0k[i % _0k.length]);
      }
      const recipeArray = JSON.parse(_0s);
      if (Array.isArray(recipeArray)) {
        recipeArray.forEach(r => {
          if (Array.isArray(r) && r.length >= 3) {
            recipes.push([r[0], r[1], r[2]]);
          }
        });
      }
    } catch (e) {
      console.warn('Failed to decrypt recipes:', e);
    }
  }

  // Parse final items
  const fiRegex = /finalItems\.add\(\s*['"]([^'"]+)['"]\s*\)/g;
  while ((m = fiRegex.exec(source)) !== null) {
    finalItems.add(m[1]);
  }

  // Parse element registrations: elements['id'] = { id: 'id', name: 'name', icon: '...', ... }
  // Use line-by-line approach to avoid brace-matching issues with SVG content
  const lines = source.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const elemMatch = line.match(/elements\['([^']+)'\]\s*=\s*\{/);
    if (elemMatch) {
      const id = elemMatch[1];
      // Collect lines until we find the closing };
      let block = line;
      let braceDepth = (line.match(/\{/g) || []).length - (line.match(/\}/g) || []).length;
      let j = i + 1;
      while (j < lines.length && braceDepth > 0) {
        block += '\n' + lines[j];
        braceDepth += (lines[j].match(/\{/g) || []).length;
        braceDepth -= (lines[j].match(/\}/g) || []).length;
        j++;
      }

      // Extract name
      const nameMatch = block.match(/name:\s*'([^']+)'/);
      // Extract icon: find icon: '...' - the value starts after icon: ' and ends at the last ' before discovered:
      const iconStart = block.indexOf("icon:");
      let icon = '';
      if (iconStart !== -1) {
        const firstQuote = block.indexOf("'", iconStart + 5);
        if (firstQuote !== -1) {
          // Find the last single quote before 'discovered' or end of block
          const discoveredIdx = block.indexOf('discovered');
          const searchEnd = discoveredIdx !== -1 ? discoveredIdx : block.length;
          let lastQuote = block.lastIndexOf("'", searchEnd - 1);
          if (lastQuote > firstQuote) {
            icon = block.substring(firstQuote + 1, lastQuote);
          }
        }
      }

      if (nameMatch) {
        const name = nameMatch[1];
        elementNames[id] = name.split(/[-\s]+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        if (icon) elementIcons[id] = icon;
      }
    }
  }

  // Parse BASE_ELEMENTS array
  const baseArrayRegex = /const BASE_ELEMENTS\s*=\s*\[([\s\S]*?)\];/;
  const baseArrayMatch = baseArrayRegex.exec(source);
  if (baseArrayMatch) {
    const baseBlock = baseArrayMatch[1];
    const baseItemRegex = /\{\s*id:\s*'([^']+)',\s*name:\s*'([^']+)',\s*icon:\s*'([^']*)'\s*\}/g;
    while ((m = baseItemRegex.exec(baseBlock)) !== null) {
      const id = m[1];
      const name = m[2];
      const icon = m[3];
      if (BASE_ELEMENTS.includes(id)) {
        elementNames[id] = name.split(/[-\s]+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        if (icon) elementIcons[id] = icon;
      }
    }
  }

  // Parse final items: finalItems.add('id')
  const finalRegex = /finalItems\.add\(\s*'([^']+)'\s*\)/g;
  while ((m = finalRegex.exec(source)) !== null) {
    finalItems.add(m[1]);
  }

  // Normalize all SVG icons to uniform size
  for (const id in elementIcons) {
    let svg = elementIcons[id];
    if (svg) {
      svg = svg.replace(/\s+width="[^"]*"/gi, '');
      svg = svg.replace(/\s+height="[^"]*"/gi, '');
      svg = svg.replace(/<svg\b([^>]*)>/i, '<svg$1 width="1.2em" height="1.2em">');
      elementIcons[id] = svg;
    }
  }

  return { elementNames, elementIcons, finalItems, recipes };
}

// =============================================
// Dragon Studio category (user-defined, not in source data)
// =============================================
const DRAGON_STUDIO_ELEMENTS = new Set(['chicken', 'grass', 'wood', 'stick']);

// =============================================
// Graph data structures (populated after data load)
// =============================================
let allElements = new Set();
let recipesByResult = {};
let recipesByIngredient = {};
let downstreamOf = {};
let upstreamOf = {};

function buildGraph() {
  allElements = new Set(BASE_ELEMENTS);
  recipesByResult = {};
  recipesByIngredient = {};
  downstreamOf = {};
  upstreamOf = {};

  RECIPES.forEach(([a, b, result]) => {
    allElements.add(a);
    allElements.add(b);
    allElements.add(result);
    if (!recipesByResult[result]) recipesByResult[result] = [];
    recipesByResult[result].push([a, b]);
    if (!recipesByIngredient[a]) recipesByIngredient[a] = [];
    recipesByIngredient[a].push([a, b, result]);
    if (!recipesByIngredient[b]) recipesByIngredient[b] = [];
    recipesByIngredient[b].push([a, b, result]);

    if (!downstreamOf[a]) downstreamOf[a] = new Set();
    if (!downstreamOf[b]) downstreamOf[b] = new Set();
    downstreamOf[a].add(result);
    downstreamOf[b].add(result);

    if (!upstreamOf[result]) upstreamOf[result] = new Set();
    upstreamOf[result].add(a);
    upstreamOf[result].add(b);
  });

  // Ensure all final items are included even if they have no recipe
  FINAL_ITEMS.forEach(id => allElements.add(id));

  // Ensure all registered elements are included (some may not appear in any recipe)
  Object.keys(ELEMENT_NAMES).forEach(id => allElements.add(id));

  const ghosts = [...allElements].filter(id => !ELEMENT_NAMES[id]);
  GHOST_IDS = ghosts;
  console.log('Ghost elements before add:', ghosts);

  // Debug: show recipe roles for ghost elements
  ghosts.forEach(id => {
    const asResult = RECIPES.filter(r => r[2] === id);
    const asIngredient = RECIPES.filter(r => r[0] === id || r[1] === id);
    console.log(`Ghost ${id}: as result=${asResult.length}, as ingredient=${asIngredient.length}`);
    asResult.forEach(r => {
      const aName = ELEMENT_NAMES[r[0]] || r[0];
      const bName = ELEMENT_NAMES[r[1]] || r[1];
      console.log(`  -> ${aName} + ${bName} = ${id}`);
    });
    asIngredient.forEach(r => {
      const other = r[0] === id ? r[1] : r[0];
      const otherName = ELEMENT_NAMES[other] || other;
      const resultName = ELEMENT_NAMES[r[2]] || r[2];
      console.log(`  -> ${id} + ${otherName} = ${resultName}`);
    });
  });

  // Add ghost elements that appear in recipes but have no definition
  ghosts.forEach(id => {
    ELEMENT_NAMES[id] = id;
    ELEMENT_ICONS[id] = `<i class="fas fa-question"></i>`;
  });
  console.log('Ghost elements added:', ghosts.length);

  const elementList = [...allElements].sort();
  console.log('Total elements:', allElements.size);
  console.log('Element IDs:', elementList.join(', '));
  console.log('Missing from ELEMENT_NAMES after add:', [...allElements].filter(id => !ELEMENT_NAMES[id]).join(', '));
  console.log('ELEMENT_NAMES count:', Object.keys(ELEMENT_NAMES).length);

  document.getElementById('stat-elements').textContent = allElements.size;
  document.getElementById('stat-recipes').textContent = RECIPES.length;
}

// =============================================
// Chain traversal
// =============================================
function getFullChain(rootId) {
  const chain = new Set();
  const stackDown = [rootId];
  while (stackDown.length) {
    const cur = stackDown.pop();
    if (chain.has(cur)) continue;
    chain.add(cur);
    (downstreamOf[cur] || []).forEach(d => { if (!chain.has(d)) stackDown.push(d); });
  }
  const stackUp = [rootId];
  while (stackUp.length) {
    const cur = stackUp.pop();
    if (chain.has(cur)) continue;
    chain.add(cur);
    (upstreamOf[cur] || []).forEach(u => { if (!chain.has(u)) stackUp.push(u); });
  }
  return chain;
}

const canvas = document.getElementById('canvas');

let W, H;
let dpr = window.devicePixelRatio || 1;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

}

// Camera
let camX = 0, camY = 0, camZoom = 1;
let isDragging = false, dragStartX, dragStartY, camStartX, camStartY;

container.addEventListener('mousedown', e => {
  if (e.target !== canvas) return;
  isDragging = true;
  container.classList.add('dragging');
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  camStartX = camX;
  camStartY = camY;
});
window.addEventListener('mousemove', e => {
  if (isDragging) {
    camX = camStartX - (e.clientX - dragStartX) / camZoom;
    camY = camStartY - (e.clientY - dragStartY) / camZoom;
    render();
  }
  handleHover(e);
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  container.classList.remove('dragging');
});
container.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.max(0.15, Math.min(3, camZoom * factor));
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  camX = mx - (mx - camX) * (newZoom / camZoom);
  camY = my - (my - camY) * (newZoom / camZoom);
  camZoom = newZoom;
  render();
}, { passive: false });

// Touch
let lastTouchDist = 0;
container.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    camStartX = camX;
    camStartY = camY;
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
container.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    camX = camStartX - (e.touches[0].clientX - dragStartX) / camZoom;
    camY = camStartY - (e.touches[0].clientY - dragStartY) / camZoom;
    render();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastTouchDist > 0) {
      camZoom = Math.max(0.15, Math.min(3, camZoom * (dist / lastTouchDist)));
      render();
    }
    lastTouchDist = dist;
  }
}, { passive: true });
container.addEventListener('touchend', () => { isDragging = false; lastTouchDist = 0; });

// =============================================
// Click — lock tooltip on element
// =============================================
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (dragonStudioHighlight) {
    dragonStudioHighlight = false;
    document.getElementById('btn-dragon').classList.remove('active');
    activeChain = null;
  }

  const w = screenToWorld(mx, my);

  let found = null;
  let minDist = Infinity;
  nodes.forEach(n => {
    const dx = w.x - n.x;
    const dy = w.y - n.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < n.radius + 8 && dist < minDist) {
      minDist = dist;
      found = n;
    }
  });

  if (lockedNode) {
    if (found && found.id === lockedNode.id) {
      // Clicked on same locked element: unlock
      lockedNode = null;
      hoveredNode = null;
      activeChain = null;
      upstreamSet = null;
      downstreamSet = null;
      tooltip.style.display = 'none';
      render();
      return;
    }
    // Clicked on different element or blank: unlock first
    lockedNode = null;
    hoveredNode = null;
    activeChain = null;
    upstreamSet = null;
    downstreamSet = null;
    tooltip.style.display = 'none';
    render();
    if (found) {
      lockedNode = found;
      hoveredNode = found;
      activeChain = new Set([found.id]);
      upstreamSet = new Set();
      (recipesByResult[found.id] || []).forEach(([a, b]) => {
        upstreamSet.add(a);
        upstreamSet.add(b);
      });
      upstreamSet.forEach(id => activeChain.add(id));
      downstreamSet = new Set();
      (downstreamOf[found.id] || []).forEach(id => {
        downstreamSet.add(id);
        activeChain.add(id);
      });
      renderTooltip(found, e.clientX, e.clientY);
      render();
    }
    return;
  }

  if (found) {
    lockedNode = found;
    hoveredNode = found;
    activeChain = new Set([found.id]);
    upstreamSet = new Set();
    (recipesByResult[found.id] || []).forEach(([a, b]) => {
      upstreamSet.add(a);
      upstreamSet.add(b);
    });
    upstreamSet.forEach(id => activeChain.add(id));
    downstreamSet = new Set();
    (downstreamOf[found.id] || []).forEach(id => {
      downstreamSet.add(id);
      activeChain.add(id);
    });
    renderTooltip(found, e.clientX, e.clientY);
    render();
  }
});

function getColor(id) {
  if (BASE_COLORS[id]) return BASE_COLORS[id];
  if (CATEGORY_COLORS[id]) return CATEGORY_COLORS[id];
  return '#66bb6a';
}

function initNodes() {
  nodes = [];
  edges = [];
  nodeMap = {};

  // Detect implicit final items: elements that are never used as ingredients in any recipe
  // (they have no entries in recipesByIngredient, meaning nothing crafts them further)
  const implicitFinals = new Set();
  allElements.forEach(id => {
    if (BASE_ELEMENTS.includes(id)) return;
    if (FINAL_ITEMS.has(id)) return;
    if (!recipesByIngredient[id] || recipesByIngredient[id].length === 0) {
      implicitFinals.add(id);
    }
  });

  allElements.forEach(id => {
    const isImplicitFinal = implicitFinals.has(id);
    const node = {
      id,
      name: ELEMENT_NAMES[id] || id,
      x: 0, y: 0,
      color: getColor(id),
      isBase: BASE_ELEMENTS.includes(id),
      isFinal: FINAL_ITEMS.has(id),
      isImplicitFinal,
      isGhost: GHOST_IDS.includes(id),
      radius: 20,
      depth: BASE_ELEMENTS.includes(id) ? 0 : (recipesByResult[id] ? 999 : 0)
    };
    nodes.push(node);
    nodeMap[id] = node;
  });

  // Calculate depth
  function calcDepth(id, visited = new Set()) {
    if (BASE_ELEMENTS.includes(id)) return 0;
    if (visited.has(id)) return 999;
    visited.add(id);
    const sources = recipesByResult[id];
    if (!sources) return nodeMap[id] ? nodeMap[id].depth : 0;
    let minD = 999;
    sources.forEach(([a, b]) => {
      minD = Math.min(minD, 1 + Math.min(calcDepth(a, visited), calcDepth(b, visited)));
    });
    return minD;
  }
  nodes.forEach(n => { n.depth = calcDepth(n.id); });

  // All elements same radius
  nodes.forEach(n => { n.radius = 28; });

  // Initialize edges
  RECIPES.forEach(([a, b, result]) => {
    edges.push({ from: a, to: result });
    edges.push({ from: b, to: result });
  });
}

// =============================================
// Organic left-to-right layout (initial)
// =============================================
function runOrganicLayout() {
  const LAYER_X_GAP = 360;

  nodes.forEach(n => {
    const d = Math.min(n.depth, 10);
    n.x = d * LAYER_X_GAP + (Math.random() - 0.5) * 50;
    n.y = (Math.random() - 0.5) * 1200;
  });

  const nextNeighbors = {};
  const prevNeighbors = {};
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    if (!nextNeighbors[a.id]) nextNeighbors[a.id] = new Set();
    nextNeighbors[a.id].add(b.id);
    if (!prevNeighbors[b.id]) prevNeighbors[b.id] = new Set();
    prevNeighbors[b.id].add(a.id);
  });

  for (let pass = 0; pass < 10; pass++) {
    nodes.forEach(n => {
      if (n.isBase) return;
      const prev = prevNeighbors[n.id];
      if (prev && prev.size > 0) {
        let sumY = 0, cnt = 0;
        prev.forEach(pid => { const pn = nodeMap[pid]; if (pn) { sumY += pn.y; cnt++; } });
        if (cnt > 0) n.y = n.y * 0.35 + (sumY / cnt) * 0.65;
      }
    });
    nodes.forEach(n => {
      const next = nextNeighbors[n.id];
      if (next && next.size > 0) {
        let sumY = 0, cnt = 0;
        next.forEach(nid => { const nn = nodeMap[nid]; if (nn) { sumY += nn.y; cnt++; } });
        if (cnt > 0) n.y = n.y * 0.35 + (sumY / cnt) * 0.65;
      }
    });
  }

  for (let iter = 0; iter < 350; iter++) {
    const temp = 1 - iter / 350;
    nodes.forEach(n => { n.vx = 0; n.vy = 0; });

    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.max(1, Math.sqrt(dx*dx + dy*dy));
        const minDist = 130;
        if (dist < minDist * 2.5) {
          const force = 3000 / (dist * dist) * temp;
          const fx = (dx / dist) * force;
          const fy = (dy / dist) * force;
          a.vx -= fx; a.vy -= fy;
          b.vx += fx; b.vy += fy;
        }
      }
    }

    edges.forEach(e => {
      const a = nodeMap[e.from], b = nodeMap[e.to];
      if (!a || !b) return;
      const dy = b.y - a.y;
      const force = dy * 0.002 * temp;
      a.vy += force; b.vy -= force;
    });

    nodes.forEach(n => {
      const targetX = Math.min(n.depth, 10) * LAYER_X_GAP;
      n.vx += (targetX - n.x) * 0.015 * temp;
      n.vy -= n.y * 0.0008 * temp;
    });

    nodes.forEach(n => {
      n.vy *= 0.65;
      n.vx *= 0.65;
      n.y += n.vy;
      n.x += n.vx;
    });
  }

  // Initialize velocities for floating animation
  nodes.forEach(n => { n.vx = 0; n.vy = 0; });
}

// =============================================
// Continuous floating animation
// =============================================
const LAYER_X_GAP = 360;
let floatAnimId = null;

function startFloating() {
  const minDist = 130;
  function tick() {
    // Apply forces
    nodes.forEach(n => {
      // Gentle random drift
      n.vx += (Math.random() - 0.5) * 0.15;
      n.vy += (Math.random() - 0.5) * 0.15;
      // X spring to layer position
      const targetX = Math.min(n.depth, 10) * LAYER_X_GAP;
      n.vx += (targetX - n.x) * 0.003;
      // Y gravity
      n.vy -= n.y * 0.0004;
    });

    // Repulsion between all nodes
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.max(1, Math.sqrt(dx*dx + dy*dy));
        if (dist < minDist * 2) {
          const force = 800 / (dist * dist);
          const fx = (dx / dist) * force;
          const fy = (dy / dist) * force;
          a.vx -= fx; a.vy -= fy;
          b.vx += fx; b.vy += fy;
        }
      }
    }

    // Edge Y attraction
    edges.forEach(e => {
      const a = nodeMap[e.from], b = nodeMap[e.to];
      if (!a || !b) return;
      const dy = b.y - a.y;
      a.vy += dy * 0.0005;
      b.vy -= dy * 0.0005;
    });

    // Apply with heavy damping for smooth, slow movement
    nodes.forEach(n => {
      n.vx *= 0.92;
      n.vy *= 0.92;
      n.x += n.vx;
      n.y += n.vy;
    });

    render();
    floatAnimId = requestAnimationFrame(tick);
  }
  floatAnimId = requestAnimationFrame(tick);
}

// =============================================
// Rendering
// =============================================
function worldToScreen(wx, wy) {
  return {
    x: (wx - camX) * camZoom + W / 2,
    y: (wy - camY) * camZoom + H / 2
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / camZoom + camX,
    y: (sy - H / 2) / camZoom + camY
  };
}

let activeChain = null;
let upstreamSet = null;
let downstreamSet = null;
let dragonStudioHighlight = false;

function bezierPoint(p0, p1, p2, p3, t) {
  const mt = 1 - t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}

function render() {
  ctx.clearRect(0, 0, W, H);
  const hasActiveChain = activeChain !== null;
  const tc = getThemeCanvasColors();

  const drawnEdges = new Set();
  edges.forEach(e => {
    const key = e.from < e.to ? e.from + '|' + e.to : e.to + '|' + e.from;
    if (drawnEdges.has(key)) return;
    drawnEdges.add(key);

    const a = nodeMap[e.from];
    const b = nodeMap[e.to];
    if (!a || !b) return;

    const sa = worldToScreen(a.x, a.y);
    const sb = worldToScreen(b.x, b.y);

    if ((sa.x < -200 && sb.x < -200) || (sa.x > W+200 && sb.x > W+200) ||
        (sa.y < -200 && sb.y < -200) || (sa.y > H+200 && sb.y > H+200)) return;

    const bothInChain = hasActiveChain && activeChain.has(a.id) && activeChain.has(b.id);

    let edgeType = null;
    if (bothInChain && hoveredNode && upstreamSet && downstreamSet) {
      const hoveredId = hoveredNode.id;
      const aIsHovered = a.id === hoveredId;
      const bIsHovered = b.id === hoveredId;
      const aIsUpstream = upstreamSet.has(a.id);
      const bIsUpstream = upstreamSet.has(b.id);
      const aIsDownstream = downstreamSet.has(a.id);
      const bIsDownstream = downstreamSet.has(b.id);

      if (bIsUpstream && !aIsUpstream) {
        edgeType = 'upstream';
      } else if (aIsDownstream && !bIsDownstream) {
        edgeType = 'downstream';
      } else if (aIsUpstream && bIsUpstream) {
        edgeType = 'upstream';
      } else if (aIsDownstream && bIsDownstream) {
        edgeType = 'downstream';
      } else if (aIsHovered && bIsDownstream) {
        // hovered → its direct product
        edgeType = 'downstream';
      } else if (bIsHovered && aIsUpstream) {
        // direct ingredient → hovered
        edgeType = 'upstream';
      } else if (bIsUpstream) {
        edgeType = 'upstream';
      } else if (aIsDownstream) {
        edgeType = 'downstream';
      }
    }

    const rA = a.radius * camZoom;
    const rB = b.radius * camZoom;
    const startX = sa.x + rA;
    const startY = sa.y;
    const endX = sb.x - rB;
    const endY = sb.y;
    const cpOffset = Math.abs(endX - startX) * 0.4;

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.bezierCurveTo(startX + cpOffset, startY, endX - cpOffset, endY, endX, endY);

    const isGhostEdge = (a && a.isGhost) || (b && b.isGhost);

    if (bothInChain) {
      if (isGhostEdge) {
        ctx.strokeStyle = '#4fc3f7';
        ctx.lineWidth = 2.5;
      } else if (edgeType === 'upstream') {
        ctx.strokeStyle = 'rgba(255,160,60,0.7)';
        ctx.lineWidth = 2.8;
      } else if (edgeType === 'downstream') {
        ctx.strokeStyle = 'rgba(80,220,200,0.7)';
        ctx.lineWidth = 2.8;
      } else {
        ctx.strokeStyle = tc.chainEdge;
        ctx.lineWidth = 2.5;
      }
    } else if (hasActiveChain) {
      ctx.strokeStyle = tc.chainDimEdge;
      ctx.lineWidth = 0.8;
    } else {
      ctx.strokeStyle = tc.dimEdge;
      ctx.lineWidth = 1;
    }
    ctx.stroke();

    if (bothInChain) {
      const arrowSize = 7;
      const t = 0.95;
      const t2 = 0.88;
      const bx = bezierPoint(startX, startX + cpOffset, endX - cpOffset, endX, t);
      const by = bezierPoint(startY, startY, endY, endY, t);
      const bx2 = bezierPoint(startX, startX + cpOffset, endX - cpOffset, endX, t2);
      const by2 = bezierPoint(startY, startY, endY, endY, t2);
      const ang = Math.atan2(by - by2, bx - bx2);

      let arrowColor;
      if (isGhostEdge) {
        arrowColor = '#4fc3f7';
      } else if (edgeType === 'upstream') {
        arrowColor = 'rgba(255,160,60,0.8)';
      } else if (edgeType === 'downstream') {
        arrowColor = 'rgba(80,220,200,0.8)';
      } else {
        arrowColor = tc.chainArrow;
      }

      ctx.beginPath();
      ctx.moveTo(endX, endY);
      ctx.lineTo(endX - arrowSize * Math.cos(ang - 0.4), endY - arrowSize * Math.sin(ang - 0.4));
      ctx.lineTo(endX - arrowSize * Math.cos(ang + 0.4), endY - arrowSize * Math.sin(ang + 0.4));
      ctx.closePath();
      ctx.fillStyle = arrowColor;
      ctx.fill();
    }
  });

  const sortedNodes = [...nodes].sort((a, b) => {
    if (a.isBase !== b.isBase) return a.isBase ? -1 : 1;
    return a.depth - b.depth;
  });

  sortedNodes.forEach(n => {
    const s = worldToScreen(n.x, n.y);
    const r = n.radius * camZoom;

    if (s.x < -r*3 || s.x > W+r*3 || s.y < -r*3 || s.y > H+r*3) return;

    const inChain = hasActiveChain ? activeChain.has(n.id) : false;

    if (n.isBase && !n.isGhost) {
      const glowAlpha = hasActiveChain ? (inChain ? '50' : '15') : '40';
      const glow = ctx.createRadialGradient(s.x, s.y, r*0.5, s.x, s.y, r*2.2);
      glow.addColorStop(0, n.color + glowAlpha);
      glow.addColorStop(1, n.color + '00');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 2.2, 0, Math.PI * 2);
      ctx.fill();
    }

    if (inChain && !n.isBase && !n.isGhost) {
      const glow = ctx.createRadialGradient(s.x, s.y, r*0.5, s.x, s.y, r*2);
      glow.addColorStop(0, n.color + '50');
      glow.addColorStop(1, n.color + '00');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);

    if (inChain || !hasActiveChain) {
      if (n.isGhost) {
        ctx.fillStyle = 'transparent';
      } else {
        const grad = ctx.createRadialGradient(s.x - r*0.3, s.y - r*0.3, r*0.1, s.x, s.y, r);
        grad.addColorStop(0, lightenColor(n.color, 40));
        grad.addColorStop(1, n.color);
        ctx.fillStyle = grad;
      }
    } else {
      ctx.fillStyle = n.isGhost ? 'transparent' : tc.dimNode;
    }
    ctx.fill();

    if (inChain || !hasActiveChain) {
      if (n.isGhost) {
        ctx.strokeStyle = '#4fc3f7';
      } else if (n.isFinal) {
        ctx.strokeStyle = '#f0c040';
      } else if (n.isImplicitFinal) {
        ctx.strokeStyle = '#ff6b6b';
      } else {
        ctx.strokeStyle = n.isBase ? tc.baseBorder : tc.normalBorder;
      }
      ctx.lineWidth = n.isBase ? 3 : (n.isGhost || n.isFinal || n.isImplicitFinal ? 2.5 : 1.5);
    } else {
      ctx.strokeStyle = tc.dimBorder;
      ctx.lineWidth = 1;
    }
    if (n.isGhost && (inChain || !hasActiveChain)) {
      ctx.setLineDash([4, 3]);
    } else if (n.isFinal && (inChain || !hasActiveChain)) {
      ctx.setLineDash([4, 3]);
    } else if (n.isImplicitFinal && (inChain || !hasActiveChain)) {
      ctx.setLineDash([4, 3]);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    if (camZoom > 0.3) {
      const fontSize = Math.max(9, Math.min(13, 11 * camZoom));
      ctx.font = `600 ${fontSize}px 'Segoe UI', system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const ty = s.y + r + 4;

      if (inChain || !hasActiveChain) {
        ctx.fillStyle = tc.labelShadow;
        ctx.fillText(n.name, s.x + 1, ty + 1);
        ctx.fillStyle = tc.labelText;
        ctx.fillText(n.name, s.x, ty);
      } else {
        ctx.fillStyle = tc.dimText;
        ctx.fillText(n.name, s.x, ty);
      }
    }
  });
}

function lightenColor(hex, amount) {
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amount);
  g = Math.min(255, g + amount);
  b = Math.min(255, b + amount);
  return `rgb(${r},${g},${b})`;
}

// =============================================
// Hover — chain highlight
// =============================================
let hoveredNode = null;

let lockedNode = null;

function renderTooltip(node, clientX, clientY) {
  const sources = recipesByResult[node.id] || [];
  const uses = recipesByIngredient[node.id] || [];
  const iconHtml = ELEMENT_ICONS[node.id];
    const iconDisplay = iconHtml
      ? `<span style="display:inline-flex;align-items:center;font-size:1.1em;">${iconHtml}</span>`
      : `<span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:${node.color};color:#0f1923;font-size:12px;font-weight:700;">${node.name.charAt(0)}</span>`;
    const isDragonStudio = DRAGON_STUDIO_ELEMENTS.has(node.id);
    const ttColor = node.isGhost ? '#4fc3f7' : node.color;
    let html = `<div class="tt-name" style="display:flex;align-items:center;gap:6px;color:${ttColor};position:relative;padding-right:${isDragonStudio ? '72px' : '0'};">${iconDisplay}${node.name}${isDragonStudio ? '<img src="Image/Dragon.svg" style="position:absolute;top:-18px;right:0;width:60px;height:60px;filter:drop-shadow(0 0 3px rgba(240,192,64,0.6));" alt="Dragon Studio">' : ''}</div>`;
  if (node.isBase) {
    html += `<div class="tt-recipe">Base Element</div>`;
  } else {
    html += `<div class="tt-recipe">`;
    html += `<div style="margin-bottom:4px;color:#aaa;font-size:11px;">Recipes:</div>`;
    if (sources.length === 0) {
      html += `<div style="color:#ff6b6b;font-style:italic;">Unknown recipe (not in data)</div>`;
    } else {
      sources.forEach(([a, b]) => {
        const na = ELEMENT_NAMES[a] || a;
        const nb = ELEMENT_NAMES[b] || b;
        html += `<div><span class="ingredient">${na}</span> + <span class="ingredient">${nb}</span> → <span class="result">${node.name}</span></div>`;
      });
    }
    html += `</div>`;
  }
  if (uses.length > 0 && !node.isFinal) {
    html += `<div class="tt-recipe" style="margin-top:6px;">`;
    html += `<div style="margin-bottom:4px;color:#aaa;font-size:11px;">Used to craft:</div>`;
    const unique = [...new Set(uses.map(u => u[2]))];
    unique.slice(0, 8).forEach(r => {
      html += `<div>→ <span class="result">${ELEMENT_NAMES[r] || r}</span></div>`;
    });
    if (unique.length > 8) html += `<div style="color:#666;">...and ${unique.length - 8} more</div>`;
    html += `</div>`;
  }
  if (node.isFinal) {
    html += `<div class="tt-final">⭐ Final Item</div>`;
  } else if (node.isImplicitFinal) {
    html += `<div class="tt-final" style="background:rgba(255,107,107,0.15);color:#ff6b6b;">🔒 End Product (not marked as final)</div>`;
  }
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  let tx = clientX + 16;
  let ty = clientY + 16;
  if (tx + 280 > window.innerWidth) tx = clientX - 290;
  if (ty + 200 > window.innerHeight) ty = clientY - 200;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

function handleHover(e) {
  // Don't override search highlighting, but still show tooltip
  const isSearching = !!searchInput.value.trim();
  if (isDragging) {
    if (!lockedNode) tooltip.style.display = 'none';
    return;
  }
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const w = screenToWorld(mx, my);

  let found = null;
  let minDist = Infinity;
  nodes.forEach(n => {
    const dx = w.x - n.x;
    const dy = w.y - n.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < n.radius + 8 && dist < minDist) {
      minDist = dist;
      found = n;
    }
  });

  if (found) {
    if (!isSearching && !dragonStudioHighlight && hoveredNode !== found && !lockedNode) {
      hoveredNode = found;
      // One-layer highlighting: only direct upstream ingredients + direct downstream products
      activeChain = new Set([found.id]);
      // Direct upstream: elements that are ingredients in recipes producing hovered
      upstreamSet = new Set();
      (recipesByResult[found.id] || []).forEach(([a, b]) => {
        upstreamSet.add(a);
        upstreamSet.add(b);
      });
      upstreamSet.forEach(id => activeChain.add(id));
      // Direct downstream: elements that hovered can directly craft
      downstreamSet = new Set();
      (downstreamOf[found.id] || []).forEach(id => {
        downstreamSet.add(id);
        activeChain.add(id);
      });
      render();
    }

    canvas.style.cursor = 'pointer';
    if (!lockedNode) {
      renderTooltip(found, e.clientX, e.clientY);
    }
  } else {
    if (!isSearching && !dragonStudioHighlight && hoveredNode !== null && !lockedNode) {
      hoveredNode = null;
      activeChain = null;
      upstreamSet = null;
      downstreamSet = null;
      render();
    }
    canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
    if (!lockedNode) tooltip.style.display = 'none';
  }
}

// =============================================
// Search
// =============================================
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', () => {
  if (dragonStudioHighlight) {
    dragonStudioHighlight = false;
    document.getElementById('btn-dragon').classList.remove('active');
  }
  const query = searchInput.value.trim().toLowerCase();
  if (!query) {
    activeChain = null;
    hoveredNode = null;
    lockedNode = null;
    upstreamSet = null;
    downstreamSet = null;
    tooltip.style.display = 'none';
    render();
    return;
  }

  // Find matching nodes, highlight one-layer connections
  const matched = new Set();
  let firstMatch = null;
  nodes.forEach(n => {
    if (n.name.toLowerCase().includes(query) || n.id.toLowerCase().includes(query)) {
      matched.add(n.id);
      if (!firstMatch) firstMatch = n;
      // Add direct upstream ingredients
      (recipesByResult[n.id] || []).forEach(([a, b]) => { matched.add(a); matched.add(b); });
      // Add direct downstream products
      (downstreamOf[n.id] || []).forEach(id => matched.add(id));
    }
  });

  activeChain = matched;
  upstreamSet = null;
  downstreamSet = null;
  if (firstMatch) {
    camX = firstMatch.x;
    camY = firstMatch.y;
    camZoom = 0.8;
  }
  render();
});

// Controls
// =============================================
let avgX = 0, avgY = 0;

document.getElementById('btn-reset').addEventListener('click', () => {
  camX = avgX; camY = avgY; camZoom = 0.38;
  searchInput.value = '';
  dragonStudioHighlight = false;
  document.getElementById('btn-dragon').classList.remove('active');

  hoveredNode = null;
  lockedNode = null;
  upstreamSet = null;
  downstreamSet = null;

});

document.getElementById('btn-collapse').addEventListener('click', () => {

});

document.getElementById('btn-dragon').addEventListener('click', () => {

    lockedNode = null;
    upstreamSet = null;

    btn.classList.remove('active');

  }
  render();
});

function updateDataSourceTheme() {

    dataSourceEl.style.background = 'rgba(255,255,255,0.92)';
    dataSourceEl.style.borderColor = 'rgba(0,0,0,0.1)';

    dataSourceEl.style.background = 'rgba(15,25,35,0.9)';

// =============================================
// Data source indicator
// =============================================
const dataSourceEl = document.createElement('div');
dataSourceEl.id = 'data-source';
dataSourceEl.style.cssText = 'position:fixed;top:52px;right:16px;z-index:100;background:rgba(15,25,35,0.9);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 12px;font-size:11px;color:#666;';
document.body.appendChild(dataSourceEl);

// =============================================
// Main init: try GitHub, fallback to cache
// =============================================
async function mainInit() {
  dataSourceEl.textContent = 'Loading data...';
  dataSourceEl.style.color = '#ffc107';

  let fetched = false;
  try {
    const resp = await fetch('https://raw.githubusercontent.com/shrimp0913/Shrimp-s-Alchemy/main/app.js');
    console.log('Fetch status:', resp.status, resp.ok);
    if (resp.ok) {
      const source = await resp.text();
      console.log('Source length:', source.length, 'chars');
      const parsed = parseAppJs(source);
      console.log('Parsed:', Object.keys(parsed.elementNames).length, 'elements,', parsed.recipes.length, 'recipes,', Object.keys(parsed.elementIcons).length, 'icons');

      if (parsed.recipes.length > 0) {
        ELEMENT_NAMES = parsed.elementNames;
        ELEMENT_ICONS = parsed.elementIcons;
        FINAL_ITEMS = parsed.finalItems;
        RECIPES = parsed.recipes;

        // Save to localStorage cache
        try {
          localStorage.setItem('shrimp_alchemy_cache', JSON.stringify({
            elementNames: ELEMENT_NAMES,
            elementIcons: ELEMENT_ICONS,
            finalItems: [...FINAL_ITEMS],
            recipes: RECIPES,
            timestamp: Date.now()
          }));
        } catch (e) { /* storage unavailable */ }

        dataSourceEl.textContent = `✅ Live data from GitHub (${RECIPES.length} recipes)`;
        dataSourceEl.style.color = '#66bb6a';
        fetched = true;
      }
    }
  } catch (e) {
    console.warn('Failed to fetch from GitHub:', e);
  }

  if (!fetched) {
    let usedCache = false;
    try {
      const cached = JSON.parse(localStorage.getItem('shrimp_alchemy_cache'));
      if (cached && cached.recipes && cached.recipes.length > 0) {
        ELEMENT_NAMES = cached.elementNames;
        ELEMENT_ICONS = cached.elementIcons;
        FINAL_ITEMS = new Set(cached.finalItems || []);
        RECIPES = cached.recipes;
        usedCache = true;
        const age = Math.round((Date.now() - (cached.timestamp || 0)) / 60000);
        dataSourceEl.textContent = `📦 Cached data (${age}min ago, ${RECIPES.length} recipes)`;
        dataSourceEl.style.color = '#ffb74d';
      }
    } catch (e) { /* cache corrupt or unavailable */ }

    if (!usedCache) {
      dataSourceEl.textContent = '❌ No data available (fetch failed, no cache)';
      dataSourceEl.style.color = '#ef5350';
      return;
    }
  }

  // Build graph, init nodes, layout, render
  buildGraph();
  initNodes();
  runOrganicLayout();

  avgX = nodes.reduce((s, n) => s + n.x, 0) / nodes.length;
  avgY = nodes.reduce((s, n) => s + n.y, 0) / nodes.length;
  camX = avgX;
  camY = avgY;
  camZoom = 0.38;
  startFloating();
}

mainInit();
